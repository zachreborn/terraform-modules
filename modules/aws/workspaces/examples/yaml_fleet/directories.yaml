# Three directories demonstrating different identity providers and workspace types, passed almost
# verbatim into the parent module's `directories` variable (map(object({...}))). Keys become the
# directory_key values referenced by users.yaml groups.
corp_ad:
  # PERSONAL directory backed by native Active Directory, e.g. an AWS Directory Service directory created
  # by modules/aws/directory_service_simple_ad, modules/aws/directory_service_ad_connector, or
  # modules/aws/directory_service_microsoftad.
  directory_id: "d-1111111111"
  subnet_ids:
    - "subnet-aaaaaaaa"
    - "subnet-bbbbbbbb"
  ip_group_keys:
    - "corporate_offices"

corp_saml:
  # PERSONAL directory backed by an external SAML 2.0 identity provider (e.g. Okta, Entra ID, or an IAM
  # Identity Center SAML application).
  directory_id: "d-2222222222"
  subnet_ids:
    - "subnet-cccccccc"
    - "subnet-dddddddd"
  ip_group_keys:
    - "corporate_offices"
  saml_properties:
    status: "ENABLED"
    user_access_url: "https://example.okta.com/home/amazon_aws/0oa1b2c3d4e5f6g7h8i9/123"

pool_customer_managed:
  # POOLS directory using a customer-managed identity provider. POOLS directories don't take individual
  # desktop (aws_workspaces_workspace) assignments -- pooled desktops are instead provisioned via the
  # aws_workspaces_pool resource (available in hashicorp/aws >= 6.54.0), which this module family doesn't
  # wrap yet as a deliberate scoping decision (see the workspace child module's README for the rationale).
  # This entry is included purely to demonstrate directory-level workspace-type coverage; no group in
  # users.yaml targets it. user_identity_type is CUSTOMER_MANAGED rather than AWS_IAM_IDENTITY_CENTER,
  # since the latter requires an IdcInstanceArn that the aws_workspaces_directory resource does not expose.
  workspace_type: "POOLS"
  subnet_ids:
    - "subnet-cccccccc"
    - "subnet-dddddddd"
  workspace_directory_name: "pool-directory"
  workspace_directory_description: "WorkSpaces Pools directory using a customer-managed identity provider"
  user_identity_type: "CUSTOMER_MANAGED"
