# Checkov Configuration File
# This file is used to configure checkov scan behavior and to suppress or skip checks
# For more information about the configuration file, please visit https://www.checkov.io/2.0/docs/configuration/config_file/
---
skip-check:
  # Skip check for https://docs.prismacloud.io/en/enterprise-edition/policy-reference/supply-chain-policies/terraform-policies/ensure-terraform-module-sources-use-git-url-with-commit-hash-revision
  # We want to utilize human readable tagging despite the minor security risk
  - CKV_TF_1
  # These workflows utilize write access in order to write statuses and comments
  - CKV2_GHA_1

  # ============================================================
  # BY DESIGN: Module purpose requires the capability
  # These checks flag behavior that is intentional for a reusable
  # module library. Posture enforcement is the caller's responsibility.
  # ============================================================

  # IAM user module intentionally creates IAM users; SSO is a caller-level decision
  - CKV_AWS_273

  # Security group modules must accept any port/CIDR as inputs; the caller enforces restrictions
  - CKV_AWS_24   # No ingress from 0.0.0.0/0 on port 22
  - CKV_AWS_25   # No ingress from 0.0.0.0/0 on port 3389
  - CKV_AWS_260  # No ingress from 0.0.0.0/0 on port 80
  - CKV_AWS_277  # No ingress from 0.0.0.0/0 on port -1 (all traffic)
  - CKV_AWS_382  # No egress from 0.0.0.0/0 on port -1 (all traffic)

  # VPC subnet module supports public IP assignment as a caller-controlled variable
  - CKV_AWS_130

  # Load balancer module supports internet-facing as a caller-controlled variable
  - CKV_AWS_53

  # Transfer Server module supports public exposure as a caller-controlled variable
  - CKV_AWS_164

  # ============================================================
