---
name: Test
on:
  pull_request:
  # Weekly regression run: catches upstream drift in linter rules and tofu
  # version changes without requiring a PR. terraform-docs drift is covered
  # by the equivalent schedule in build.yml.
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  test_opentofu:
    name: Test OpenTofu
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: OpenTofu - Setup OpenTofu
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: OpenTofu version
        id: version
        run: tofu version

      - name: OpenTofu fmt
        id: fmt
        run: tofu fmt -check -diff -recursive

      - name: OpenTofu test
        id: test
        # Runs `tofu test` in every module directory that has its own tests/ directory.
        # Modules without tests are skipped, so this scales automatically as more modules
        # adopt native tofu test coverage.
        run: |
          set -euo pipefail
          status=0
          while IFS= read -r -d '' dir; do
            module_dir="$(dirname "$dir")"
            echo "::group::tofu test - ${module_dir}"
            (cd "${module_dir}" && tofu init -backend=false && tofu test) || status=1
            echo "::endgroup::"
          done < <(find modules -type d -name tests -print0)
          exit "${status}"

  test_unicode:
    name: Invisible Unicode Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check for invisible Unicode characters
        run: bash .github/scripts/check_unicode.sh

  test_linter:
    name: Linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full git history is needed to get a proper
          # list of changed files within `super-linter`
          fetch-depth: 0
          persist-credentials: false

      # Run Linter against code base
      - name: Run linter against all changed files
        uses: super-linter/super-linter/slim@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On pull_request events, only lint changed files for speed.
          # On schedule events there is no diff, so scan the full codebase
          # to make the weekly regression run meaningful.
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'schedule' }}
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          VALIDATE_JSCPD: false
          VALIDATE_MARKDOWN: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_GIT_COMMITLINT: false
          SAVE_SUPER_LINTER_SUMMARY: true
