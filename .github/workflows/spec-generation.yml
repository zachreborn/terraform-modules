---
name: Spec Generation (Oz)
run-name: "Spec Generation (Oz) — Issue #${{ github.event.issue.number || inputs.issue_number }}"
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to generate a spec for"
        required: true
        type: string

# One spec generation at a time per issue.
concurrency:
  group: oz-spec-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  generate-spec:
    name: "Generate spec for Issue #${{ github.event.issue.number || inputs.issue_number }}"
    runs-on: ubuntu-latest

    # For labeled events, only trigger on the ready-for-spec label, skip if
    # skip-oz is set, and require a trusted issue author so untrusted issue
    # bodies never reach the secret-backed Oz agent. workflow_dispatch is
    # subject to the same checks at runtime via the eligibility step below.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'ready-for-spec' &&
       !contains(github.event.issue.labels.*.name, 'skip-oz') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
                github.event.issue.author_association))

    steps:
      # Credentials are intentionally persisted so the Oz agent can push the
      # spec branch back to origin. zizmor's artipacked warning is acknowledged.
      - name: Checkout # zizmor: ignore[artipacked]
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Needed so the agent can create a new branch and push.
          fetch-depth: 0

      - name: Guard - require WARP_API_KEY
        env:
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }} # zizmor: ignore[secrets-outside-env]
        run: |
          if [ -z "${WARP_API_KEY}" ]; then
            echo "::error::WARP_API_KEY secret is not configured for this repository."
            exit 1
          fi

      - name: Resolve and validate issue number
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          # Reject anything that is not a bare positive integer (>= 1) to
          # prevent GITHUB_OUTPUT injection (e.g. newlines, '=') when the
          # value comes from a free-form workflow_dispatch input. GitHub
          # issue numbers start at 1, so disallow 0 explicitly.
          if ! printf '%s' "${ISSUE_NUMBER}" | grep -Eq '^[1-9][0-9]*$'; then
            echo "::error::issue_number must be a positive integer (>= 1); got: ${ISSUE_NUMBER}"
            exit 1
          fi
          echo "issue_number=${ISSUE_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: Verify issue eligibility on manual dispatch
        # The job-level `if` only enforces skip-oz and author_association for
        # the `labeled` trigger because `github.event.issue` is unavailable
        # for workflow_dispatch. Re-check both on the target issue here so
        # manual dispatch respects the documented skip-oz override and the
        # same trust gate that protects the labeled path.
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue_number }}
        run: |
          # gh issue view does not expose authorAssociation; use the REST
          # API directly so we can read .author_association (snake_case).
          issue=$(gh api "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}")
          labels=$(printf '%s' "${issue}" | jq -r '.labels[].name')
          assoc=$(printf '%s' "${issue}" | jq -r '.author_association')
          if printf '%s\n' "${labels}" | grep -Fxq 'skip-oz'; then
            echo "::notice::Issue #${ISSUE_NUMBER} has the skip-oz label; aborting per AGENTS.md."
            exit 1
          fi
          case "${assoc}" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *)
              echo "::error::Issue #${ISSUE_NUMBER} author_association=${assoc} is not in {OWNER,MEMBER,COLLABORATOR}; refusing to run the Oz agent on untrusted issue content."
              exit 1
              ;;
          esac

      - name: Mark issue spec-in-progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue_number }}
        run: |
          # Keep ready-for-spec attached for now; the success step below
          # removes it only after the agent has opened a spec PR. This way
          # a failure mid-run does not leave the issue stuck with no
          # actionable label.
          gh issue edit "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --add-label spec-in-progress

      - name: Run Oz spec-generation agent
        uses: warpdotdev/oz-agent-action@cc32546e933acdc86dd6a9b4dd02ec956dcd8a5b # v1.0.17
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          warp_api_key: ${{ secrets.WARP_API_KEY }} # zizmor: ignore[secrets-outside-env]
          profile: ${{ vars.WARP_AGENT_PROFILE || '' }}
          # Canonical spec-generation instructions live in
          # .warp/skills/spec-generation/SKILL.md and are referenced via `skill:`.
          # Pass only per-run context through `prompt:` below.
          skill: zachreborn/terraform-modules:spec-generation
          prompt: |
            ## Run context
            Issue number: #${{ steps.ctx.outputs.issue_number }}
            Repository: ${{ github.repository }}

      - name: Mark spec PR ready-for-review
        # The Oz agent action tends to open PRs as drafts when invoked from
        # automation, which suppresses GitHub's CODEOWNERS auto-request.
        # Find the freshly-created draft spec PR (branch prefix
        # `spec/issue-N-`, isDraft=true, most-recently-created) and flip it
        # to ready-for-review. Filtering on `isDraft == true` ensures we
        # never re-flip a stale ready PR; sorting by `createdAt` ensures
        # we target the current run's PR even if PR numbers raced.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue_number }}
        run: |
          pr_number=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,headRefName,isDraft,createdAt \
            --jq "[.[] | select(.isDraft == true and (.headRefName | startswith(\"spec/issue-${ISSUE_NUMBER}-\")))] | sort_by(.createdAt) | last | .number // empty")
          if [ -z "${pr_number}" ]; then
            echo "::notice::No open *draft* spec PR matching 'spec/issue-${ISSUE_NUMBER}-*' found; nothing to flip."
            exit 0
          fi
          echo "::notice::Marking spec PR #${pr_number} ready-for-review."
          gh pr ready "${pr_number}" --repo "${{ github.repository }}" || true

      - name: Notify issue author on spec PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue_number }}
        run: |
          # Resolve the issue author's login via the REST API so this works
          # for both the labeled trigger and manual workflow_dispatch (where
          # github.event.issue is unavailable).
          author=$(gh api "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" \
            --jq '.user.login')

          # Find the spec PR for this issue (most recently created, any draft state).
          pr_number=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,headRefName,createdAt \
            --jq "[.[] | select(.headRefName | startswith(\"spec/issue-${ISSUE_NUMBER}-\"))] | sort_by(.createdAt) | last | .number // empty")

          if [ -z "${pr_number}" ]; then
            echo "::notice::No open spec PR found for issue #${ISSUE_NUMBER}; skipping notification."
            exit 0
          fi

          # Request a review from the issue author. This may be a no-op if
          # GitHub prevents requesting review from non-collaborators; the
          # || true ensures the step does not fail in that case.
          gh pr edit "${pr_number}" \
            --repo "${{ github.repository }}" \
            --add-reviewer "${author}" || true

          # Post a comment on the spec PR so the author is notified regardless
          # of whether the review request above succeeded.
          gh pr comment "${pr_number}" \
            --repo "${{ github.repository }}" \
            --body "@${author} A spec has been generated from issue #${ISSUE_NUMBER}. Please review it and approve the PR so the implementation phase can begin."

      - name: On success - drop ready-for-spec
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue_number }}
        run: |
          gh issue edit "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --remove-label ready-for-spec || true

      - name: On failure - restore ready-for-spec, drop spec-in-progress
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue_number }}
        run: |
          gh issue edit "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --remove-label spec-in-progress || true
          # Re-attach ready-for-spec so a maintainer (or another labeled
          # event) can retry the stage. It is idempotent.
          gh issue edit "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --add-label ready-for-spec || true
          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --body "Spec generation failed. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
