---
name: Issue Triage (Oz)
run-name: "Issue Triage (Oz) — Issue #${{ github.event.issue.number }}"
on:
  issues:
    types: [opened, edited]

# Cancel any in-progress triage run for the same issue when a newer event
# arrives. The job-level `if` ensures the surviving run will actually execute
# triage rather than be skipped.
concurrency:
  group: oz-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  # Needed to dispatch the spec-generation workflow as the next stage when
  # the agent applies `ready-for-spec`. Label events from GITHUB_TOKEN do
  # not cascade to other workflows, but workflow_dispatch events from
  # GITHUB_TOKEN do, which is how this chain is restored.
  actions: write

jobs:
  triage:
    name: "Triage Issue #${{ github.event.issue.number }}"
    runs-on: ubuntu-latest

    # Skip when:
    #   - The issue has already advanced past triage (pipeline labels present)
    #   - The human explicitly opted out via skip-oz
    #   - The author is untrusted (protects secrets from arbitrary issue text)
    #   - The event is an `edited` event sent by a bot (prevents triage loops
    #     from automated issue edits; bot-authored issues are already excluded
    #     by the author_association check).
    if: >-
      !contains(github.event.issue.labels.*.name, 'skip-oz') &&
      !contains(github.event.issue.labels.*.name, 'ready-for-spec') &&
      !contains(github.event.issue.labels.*.name, 'spec-in-progress') &&
      !contains(github.event.issue.labels.*.name, 'spec-ready-for-review') &&
      !contains(github.event.issue.labels.*.name, 'spec-approved') &&
      !contains(github.event.issue.labels.*.name, 'implementation-in-progress') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.issue.author_association) &&
      (github.event.action == 'opened' ||
       github.event.sender.type != 'Bot')

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Guard - require WARP_API_KEY
        env:
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }} # zizmor: ignore[secrets-outside-env]
        run: |
          if [ -z "${WARP_API_KEY}" ]; then
            echo "::error::WARP_API_KEY secret is not configured for this repository."
            exit 1
          fi

      - name: Run Oz triage agent
        uses: warpdotdev/oz-agent-action@8ba4e142060cca997ddf354d8c40da7511110510 # v1.0.23
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          warp_api_key: ${{ secrets.WARP_API_KEY }} # zizmor: ignore[secrets-outside-env]
          profile: ${{ vars.WARP_AGENT_PROFILE || '' }}
          # Canonical triage instructions live in
          # .warp/skills/issue-triage/SKILL.md and are referenced via `skill:`.
          # Pass only per-run context through `prompt:` below.
          skill: zachreborn/terraform-modules:issue-triage
          prompt: |
            ## Run context
            Issue number: #${{ github.event.issue.number }}
            Repository: ${{ github.repository }}
            URL: ${{ github.event.issue.html_url }}
            Title: ${{ github.event.issue.title }}
            Labels: ${{ join(github.event.issue.labels.*.name, ', ') }}

            Body:
            ---
            ${{ github.event.issue.body }}
            ---

      - name: Chain to Spec Generation if ready-for-spec was applied
        # Labels applied with GITHUB_TOKEN do not trigger downstream
        # workflows (intentional GitHub safeguard against loops), so the
        # ready-for-spec label that the triage agent just added would not
        # by itself fire `spec-generation.yml`. Explicitly dispatch the
        # next stage here. workflow_dispatch events from GITHUB_TOKEN are
        # allowed to start new runs.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          labels=$(gh api "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" \
            --jq '.labels[].name')
          if printf '%s\n' "${labels}" | grep -Fxq 'skip-oz'; then
            echo "::notice::Issue #${ISSUE_NUMBER} has skip-oz; not chaining."
            exit 0
          fi
          if ! printf '%s\n' "${labels}" | grep -Fxq 'ready-for-spec'; then
            echo "::notice::Issue #${ISSUE_NUMBER} did not end up ready-for-spec; not chaining."
            exit 0
          fi
          echo "::notice::Dispatching Spec Generation (Oz) for #${ISSUE_NUMBER}"
          gh workflow run spec-generation.yml \
            --repo "${{ github.repository }}" \
            --field issue_number="${ISSUE_NUMBER}"
