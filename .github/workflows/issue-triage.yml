---
name: Issue Triage (Oz)
on:
  issues:
    types: [opened, edited]

# Cancel any in-progress triage run for the same issue when a newer event
# arrives. The job-level `if` ensures the surviving run will actually execute
# triage rather than be skipped.
concurrency:
  group: oz-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  # Needed to dispatch the spec-generation workflow as the next stage when
  # the agent applies `ready-for-spec`. Label events from GITHUB_TOKEN do
  # not cascade to other workflows, but workflow_dispatch events from
  # GITHUB_TOKEN do, which is how this chain is restored.
  actions: write

jobs:
  triage:
    name: Triage issue with Oz
    runs-on: ubuntu-latest

    # Skip when:
    #   - The issue has already advanced past triage (pipeline labels present)
    #   - The human explicitly opted out via skip-oz
    #   - The author is untrusted (protects secrets from arbitrary issue text)
    #   - The event is an `edited` event sent by a bot (prevents triage loops
    #     from automated issue edits; bot-authored issues are already excluded
    #     by the author_association check).
    if: >-
      !contains(github.event.issue.labels.*.name, 'skip-oz') &&
      !contains(github.event.issue.labels.*.name, 'ready-for-spec') &&
      !contains(github.event.issue.labels.*.name, 'spec-in-progress') &&
      !contains(github.event.issue.labels.*.name, 'spec-ready-for-review') &&
      !contains(github.event.issue.labels.*.name, 'spec-approved') &&
      !contains(github.event.issue.labels.*.name, 'implementation-in-progress') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.issue.author_association) &&
      (github.event.action == 'opened' ||
       github.event.sender.type != 'Bot')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Guard - require WARP_API_KEY
        env:
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }} # zizmor: ignore[secrets-outside-env]
        run: |
          if [ -z "${WARP_API_KEY}" ]; then
            echo "::error::WARP_API_KEY secret is not configured for this repository."
            exit 1
          fi

      - name: Run Oz triage agent
        uses: warpdotdev/oz-agent-action@960b59065ed52c7a3f0c7d0de2665cd058f93626 # main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          warp_api_key: ${{ secrets.WARP_API_KEY }} # zizmor: ignore[secrets-outside-env]
          profile: ${{ vars.WARP_AGENT_PROFILE || '' }}
          prompt: |
            You are triaging a GitHub issue in zachreborn/terraform-modules,
            a Terraform/OpenTofu module library (OpenTofu is the default;
            Terraform is also supported). Validate the issue against the
            minimum standards below and update its state via the `gh` CLI.

            ## Issue
            Number: #${{ github.event.issue.number }}
            URL: ${{ github.event.issue.html_url }}
            Title: ${{ github.event.issue.title }}
            Labels: ${{ join(github.event.issue.labels.*.name, ', ') }}

            Body:
            ---
            ${{ github.event.issue.body }}
            ---

            ## Classification
            Classify as `bug` or `feature` based on the existing labels and
            body content. If both/neither, ask in a comment and apply
            `needs-info`.

            ## Minimum standards
            BUG must include:
              1. Affected module path (e.g. `modules/aws/ec2_instance`).
              2. OpenTofu or Terraform version and relevant provider versions.
              3. Reproduction steps.
              4. Expected vs. actual behavior.
              5. One of: error message, stack trace, or plan/apply output.
              6. Acceptance criteria for "fixed."

            FEATURE must include:
              1. Target module path (existing or proposed under
                 `modules/<provider>/<name>/`).
              2. Motivation / problem being solved.
              3. High-level proposed inputs and outputs.
              4. Breaking-change assessment (yes/no + scope).
              5. Acceptance criteria for "done."

            ## Actions you must take
            Use the `gh` CLI (already authenticated via GH_TOKEN).

            If ANY required item is missing:
              - Post a single comment listing each missing item by name and
                briefly explaining what is needed. End the comment with:
                "Please **edit the issue body** (not a comment reply) to add the items above — editing the body re-triggers triage automatically."
              - Run:
                gh issue edit ${{ github.event.issue.number }} \
                  --repo ${{ github.repository }} \
                  --add-label needs-info

            If ALL required items are present:
              - Post a single short comment with:
                  * Classification (bug/feature)
                  * Affected module path(s)
                  * Breaking-change risk (none/low/medium/high) with one
                    sentence of rationale
              - Run:
                gh issue edit ${{ github.event.issue.number }} \
                  --repo ${{ github.repository }} \
                  --remove-label needs-info || true
                gh issue edit ${{ github.event.issue.number }} \
                  --repo ${{ github.repository }} \
                  --add-label ready-for-spec

            Do not edit any files. Do not push commits. Do not open PRs.
            Do not invoke `terraform`. Your only side effects are issue
            comments and label changes via `gh`.

      - name: Chain to Spec Generation if ready-for-spec was applied
        # Labels applied with GITHUB_TOKEN do not trigger downstream
        # workflows (intentional GitHub safeguard against loops), so the
        # ready-for-spec label that the triage agent just added would not
        # by itself fire `spec-generation.yml`. Explicitly dispatch the
        # next stage here. workflow_dispatch events from GITHUB_TOKEN are
        # allowed to start new runs.
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          labels=$(gh api "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" \
            --jq '.labels[].name')
          if printf '%s\n' "${labels}" | grep -Fxq 'skip-oz'; then
            echo "::notice::Issue #${ISSUE_NUMBER} has skip-oz; not chaining."
            exit 0
          fi
          if ! printf '%s\n' "${labels}" | grep -Fxq 'ready-for-spec'; then
            echo "::notice::Issue #${ISSUE_NUMBER} did not end up ready-for-spec; not chaining."
            exit 0
          fi
          echo "::notice::Dispatching Spec Generation (Oz) for #${ISSUE_NUMBER}"
          gh workflow run spec-generation.yml \
            --repo "${{ github.repository }}" \
            --field issue_number="${ISSUE_NUMBER}"
