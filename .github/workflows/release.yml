name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
