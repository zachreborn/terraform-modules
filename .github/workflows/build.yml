---
name: Build
on:
  pull_request:
    branches:
      - main

jobs:
  build_terraform:
    name: Build - Terraform
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true

      - name: List all files
        run: ls -lha

      - name: stat .git/objects
        run: stat .git/objects

      - name: Terraform fmt on all files
        id: fmt
        run: terraform fmt -recursive

      - name: Build terraform docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1
        with:
          config-file: ./modules/.terraform-docs.yml
          find-dir: ./modules

      - name: List all files
        run: ls -lha

      - name: stat .git/objects
        run: stat .git/objects

      - name: Fix .git owner
        run: sudo chown runner:docker -R .git

      - name: Git stage all, commit, and push
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "chore: terraform fmt and terraform-docs"
          commit_user_name: github-actions
