---
name: Build
on:
  pull_request:
    branches:
      - main
  # Weekly regression run: catches terraform-docs output format drift
  # without requiring a PR.
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  verify_terraform_docs:
    name: Verify - terraform-docs
    runs-on: ubuntu-latest
    # Skip for release-please's own chore PRs: they only ever touch CHANGELOG.md
    # and .release-please-manifest.json, never module README.md/main.tf files, so
    # there is nothing for terraform-docs to regenerate. A job skipped via its own
    # `if:` reports "skipped", which GitHub treats as a passing state for a
    # required status check (unlike a workflow-level `paths`/`branches` filter,
    # which would leave the check stuck "pending" and block the merge forever).
    # Both the PR author AND the head branch name are checked together so an
    # external fork PR can't bypass this by naming its branch the same way
    # release-please does.
    if: ${{ !(github.event.pull_request.user.login == 'github-actions[bot]' && startsWith(github.head_ref, 'release-please--')) }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Regenerate terraform-docs (in place)
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1
        with:
          config-file: ./modules/.terraform-docs.yml
          find-dir: ./modules
          output-method: inject
          git-push: false

      - name: Fail if terraform-docs output is stale
        run: |
          if ! git diff --exit-code; then
            echo "::error::terraform-docs output is out of date. Run 'pre-commit run --all-files' (or 'terraform-docs markdown table --output-file README.md --output-mode inject <module_path>') locally and commit the result."
            exit 1
          fi
