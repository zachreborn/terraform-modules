---
name: Build
on:
  pull_request:
    branches:
      - main
  # Weekly regression run: catches terraform-docs output format drift
  # without requiring a PR.
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  verify_terraform_docs:
    name: Verify - terraform-docs
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Regenerate terraform-docs (in place)
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1
        with:
          config-file: ./modules/.terraform-docs.yml
          find-dir: ./modules
          output-method: inject
          git-push: false

      - name: Fail if terraform-docs output is stale
        run: |
          if ! git diff --exit-code; then
            echo "::error::terraform-docs output is out of date. Run 'pre-commit run --all-files' (or 'terraform-docs markdown table --output-file README.md --output-mode inject <module_path>') locally and commit the result."
            exit 1
          fi
